<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Libros</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-small"><i class="fas fa-robot"></i><span>Jarvis - Libros</span></div>
        <div class="user-info"><span id="userName"></span><button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button></div>
    </header>

    <main class="list-container">
        <!-- BUSCADOR -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-search"></i> Buscar libros</h2>
            <div class="add-item-form" style="margin-top: 15px;">
                <input type="text" id="searchBookInput" placeholder="Título, autor o ISBN..." class="glass-input">
                <button id="searchBookBtn" class="btn-primary" style="width: auto;"><i class="fas fa-search"></i> Buscar</button>
            </div>
            <div id="searchResults" style="margin-top: 20px; max-height: 400px; overflow-y: auto;"></div>
        </div>

        <!-- PESTAÑAS -->
        <div class="glass-card">
            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                <button id="tabToRead" class="btn-secondary" style="flex: 1;">📚 Por leer</button>
                <button id="tabRead" class="btn-secondary" style="flex: 1;">✅ Leídos</button>
            </div>
            <ul id="booksList" class="items-list"></ul>
        </div>
    </main>

    <div class="floating-dock">
        <a href="home.html" class="dock-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item active"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item"><i class="fas fa-tv"></i><span>Series</span></a>
        <a href="stats.html" class="dock-item"><i class="fas fa-chart-line"></i><span>Stats</span></a>
        <a href="sports.html" class="dock-item" data-page="sports"><i class="fas fa-heartbeat"></i><span>Deporte</span></a>
        <a href="nutrition.html" class="dock-item" data-page="nutrition"><i class="fas fa-apple-alt"></i><span>Comida</span></a>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/books.js"></script>
</body>
</html>
