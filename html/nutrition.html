<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Alimentación</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-small"><i class="fas fa-robot"></i><span>Jarvis - Alimentación</span></div>
        <div class="user-info"><span id="userName"></span><button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button></div>
    </header>

    <main class="list-container">
        <!-- Resumen diario -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-chart-line"></i> Resumen Diario</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="dailyCalories">0</div>
                    <div class="stat-label">Calorías hoy</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="dailyProtein">0</div>
                    <div class="stat-label">Proteínas (g)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="dailyCarbs">0</div>
                    <div class="stat-label">Carbohidratos (g)</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="dailyFat">0</div>
                    <div class="stat-label">Grasas (g)</div>
                </div>
            </div>
            <div class="progress-bar" style="margin-top: 15px;">
                <div id="calorieProgress" class="progress-fill" style="width: 0%;"></div>
            </div>
            <p id="calorieMsg" style="text-align: center; margin-top: 10px;"></p>
        </div>

        <!-- Objetivo de déficit -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-bullseye"></i> Objetivo de Déficit</h2>
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="input-field">
                    <label>Peso actual (kg)</label>
                    <input type="number" id="currentWeight" step="0.1" class="glass-input">
                </div>
                <div class="input-field">
                    <label>Peso objetivo (kg)</label>
                    <input type="number" id="goalWeight" step="0.1" class="glass-input">
                </div>
                <div class="input-field">
                    <label>Calorías diarias objetivo</label>
                    <input type="number" id="targetCalories" class="glass-input">
                </div>
                <button id="saveGoalBtn" class="btn-primary">Guardar objetivo</button>
            </div>
            <div id="goalInfo" style="margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 16px;"></div>
        </div>

        <!-- Añadir comida -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-plus-circle"></i> Registrar Comida</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <input type="text" id="foodName" placeholder="Alimento" class="glass-input" style="flex: 2;">
                <input type="number" id="foodCalories" placeholder="Calorías" class="glass-input" style="flex: 1;">
                <input type="number" id="foodProtein" placeholder="Proteínas (g)" class="glass-input" style="flex: 1;">
                <input type="number" id="foodCarbs" placeholder="Carbos (g)" class="glass-input" style="flex: 1;">
                <input type="number" id="foodFat" placeholder="Grasas (g)" class="glass-input" style="flex: 1;">
                <button id="addFoodBtn" class="btn-primary"><i class="fas fa-save"></i> Añadir</button>
            </div>
        </div>

        <!-- Buscador de alimentos (API) -->
        <div class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-search"></i> Buscar Alimento</h2>
            <div class="add-item-form">
                <input type="text" id="searchFoodInput" placeholder="Ej: Pollo, Arroz, Manzana..." class="glass-input">
                <button id="searchFoodBtn" class="btn-primary" style="width: auto;"><i class="fas fa-search"></i> Buscar</button>
            </div>
            <div id="foodSearchResults" style="margin-top: 20px; max-height: 300px; overflow-y: auto;"></div>
        </div>

        <!-- Historial de comidas -->
        <div class="glass-card">
            <h2><i class="fas fa-history"></i> Historial de Comidas</h2>
            <ul id="foodHistory" class="items-list"></ul>
        </div>
    </main>

    <div class="floating-dock">
        <a href="home.html" class="dock-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item"><i class="fas fa-tv"></i><span>Series</span></a>
        <a href="sports.html" class="dock-item"><i class="fas fa-heartbeat"></i><span>Deporte</span></a>
        <a href="nutrition.html" class="dock-item active"><i class="fas fa-apple-alt"></i><span>Comida</span></a>
        <a href="stats.html" class="dock-item"><i class="fas fa-chart-line"></i><span>Stats</span></a>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/nutrition.js"></script>
</body>
</html>
