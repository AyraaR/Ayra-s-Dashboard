<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Series y Anime</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo-small">
                <i class="fas fa-robot"></i>
                <span>Jarvis - Series</span>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <main class="list-container">
            <!-- Selector de tipo de búsqueda -->
            <div class="glass-card" style="margin-bottom: 24px;">
                <h2><i class="fas fa-search"></i> Buscar series o anime</h2>
                <div style="display: flex; gap: 12px; margin-bottom: 15px;">
                    <button id="searchSeriesTab" class="btn-secondary" style="flex: 1;">📺 Series normales</button>
                    <button id="searchAnimeTab" class="btn-secondary" style="flex: 1;">🎌 Anime</button>
                </div>
                <div class="add-item-form">
                    <input type="text" id="searchSeriesInput" placeholder="Ej: Breaking Bad, WandaVision, Naruto..." class="glass-input">
                    <button id="searchSeriesBtn" class="btn-primary" style="width: auto;"><i class="fas fa-search"></i> Buscar</button>
                </div>
                <div id="seriesSearchResults" style="margin-top: 20px; max-height: 350px; overflow-y: auto;"></div>
            </div>

            <!-- Series Pendientes -->
            <div class="glass-card" style="margin-bottom: 24px;">
                <div class="list-header">
                    <h2><i class="fas fa-clock"></i> Series Pendientes</h2>
                </div>
                <ul id="pendingSeriesList" class="items-list"></ul>
            </div>

            <!-- Series Vistas -->
            <div class="glass-card">
                <div class="list-header">
                    <h2><i class="fas fa-check-double"></i> Series Vistas</h2>
                </div>
                <ul id="watchedSeriesList" class="items-list"></ul>
            </div>
        </main>
    </div>

    <div class="floating-dock">
        <a href="home.html" class="dock-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item active"><i class="fas fa-tv"></i><span>Series</span></a>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/series.js"></script>
</body>
</html>
