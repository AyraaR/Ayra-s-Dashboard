<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Arte y Manualidades</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-small"><i class="fas fa-palette"></i><span>Jarvis - Arte</span></div>
        <div class="user-info"><span id="userName"></span><button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button></div>
    </header>

    <main class="list-container">
        <!-- Pestañas -->
        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
            <button id="tabPaintings" class="btn-primary" style="flex: 1;">🎨 Cuadros</button>
            <button id="tabCrochet" class="btn-secondary" style="flex: 1;">🧶 Ganchillo</button>
            <button id="tabBaking" class="btn-secondary" style="flex: 1;">🍰 Repostería</button>
            <button id="TabChores" class="btn-secondary" style="flex: 1;">🧹 Tareas</button>
        </div>

        <!-- SECCIÓN CUADROS -->
        <div id="paintingsSection" class="glass-card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-palette"></i> Mis Cuadros</h2>
            <div class="add-item-form" style="margin-top: 15px;">
                <input type="text" id="paintingTitle" placeholder="Título del cuadro" class="glass-input">
                <input type="text" id="paintingTechnique" placeholder="Técnica (óleo, acrílico...)" class="glass-input">
                <input type="date" id="paintingDate" class="glass-input" style="width: auto;">
                <button id="addPaintingBtn" class="btn-primary"><i class="fas fa-plus"></i> Añadir</button>
            </div>
            <div id="paintingsList" class="items-list" style="margin-top: 20px;"></div>
        </div>

        <!-- SECCIÓN GANCHILLO -->
        <div id="crochetSection" class="glass-card" style="margin-bottom: 24px; display: none;">
            <h2><i class="fas fa-tshirt"></i> Proyectos de Ganchillo</h2>
            <div class="add-item-form" style="margin-top: 15px;">
                <input type="text" id="crochetName" placeholder="Nombre del proyecto" class="glass-input">
                <input type="text" id="crochetYarn" placeholder="Lana / Material" class="glass-input">
                <input type="number" id="crochetProgress" placeholder="Progreso %" class="glass-input" style="width: 100px;">
                <button id="addCrochetBtn" class="btn-primary"><i class="fas fa-plus"></i> Añadir</button>
            </div>
            <div id="crochetList" class="items-list" style="margin-top: 20px;"></div>
        </div>

        <!-- SECCIÓN REPOSTERÍA -->
        <div id="bakingSection" class="glass-card" style="margin-bottom: 24px; display: none;">
            <h2><i class="fas fa-cake-candles"></i> Mis Recetas</h2>
            <div class="add-item-form" style="margin-top: 15px;">
                <input type="text" id="recipeName" placeholder="Nombre de la receta" class="glass-input">
                <input type="text" id="recipeIngredients" placeholder="Ingredientes principales" class="glass-input">
                <select id="recipeDifficulty" class="glass-input" style="width: auto;">
                    <option value="fácil">🍰 Fácil</option>
                    <option value="medio">🍪 Medio</option>
                    <option value="difícil">🎂 Difícil</option>
                </select>
                <button id="addRecipeBtn" class="btn-primary"><i class="fas fa-plus"></i> Añadir</button>
            </div>
            <div id="recipesList" class="items-list" style="margin-top: 20px;"></div>
        </div>

        <!-- SECCIÓN TAREAS CASA -->
        <div id="choresSection" class="glass-card" style="margin-bottom: 24px; display: none;">
            <h2><i class="fas fa-broom"></i> Tareas de Casa</h2>
            <div class="add-item-form" style="margin-top: 15px;">
                <input type="text" id="choreName" placeholder="Tarea (ej: limpiar baño)" class="glass-input">
                <select id="choreFrequency" class="glass-input" style="width: auto;">
                    <option value="daily">📅 Diaria</option>
                    <option value="weekly">📆 Semanal</option>
                    <option value="monthly">📅 Mensual</option>
                </select>
                <button id="addChoreBtn" class="btn-primary"><i class="fas fa-plus"></i> Añadir</button>
            </div>
            <div id="choresList" class="items-list" style="margin-top: 20px;"></div>
            <div id="choresHistory" class="items-list" style="margin-top: 20px;"></div>
        </div>
    </main>

    <div class="floating-dock">
        <a href="home.html" class="dock-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item"><i class="fas fa-tv"></i><span>Series</span></a>
        <a href="sports.html" class="dock-item"><i class="fas fa-heartbeat"></i><span>Deporte</span></a>
        <a href="nutrition.html" class="dock-item"><i class="fas fa-apple-alt"></i><span>Comida</span></a>
        <a href="crafts.html" class="dock-item active"><i class="fas fa-palette"></i><span>Arte</span></a>
        <a href="stats.html" class="dock-item"><i class="fas fa-chart-line"></i><span>Stats</span></a>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/crafts.js"></script>
</body>
</html>
