<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Calculadora Laboral</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-small"><i class="fas fa-robot"></i><span>Jarvis - Calculadora</span></div>
        <div class="user-info"><span id="userName"></span><button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button></div>
    </header>

    <main class="calculator-container">
        <div class="glass-card">
            <h2><i class="fas fa-calendar-week"></i> Planificación Semanal</h2>
            <p style="margin-bottom: 20px;">Configura cada día: entrada, teletrabajo, vacaciones u horas personalizadas</p>
            
            <div id="daySelector" class="day-selector"></div>
            <div id="configPanel" class="config-panel"></div>

            <div id="weeklySummary" class="weekly-summary">
                <div class="result-box">
                    <h3>Resumen Semanal</h3>
                    <p>📊 Total horas trabajadas: <strong id="totalWeekHours">0</strong> / 40</p>
                    <p>⚖️ Diferencia: <strong id="weekDifference">0</strong> horas</p>
                    <p id="adjustmentMsg" style="color: var(--warning);"></p>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-dock">
        <a href="home.html" class="dock-item" data-page="home"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item active" data-page="calculator"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item" data-page="shopping"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item" data-page="books"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item" data-page="series"><i class="fas fa-tv"></i><span>Series</span></a>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/calculator.js"></script>
</body>
</html>
