<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Lista de Compras</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="glass-header">
        <div class="logo-small"><i class="fas fa-robot"></i><span>Jarvis - Compras</span></div>
        <div class="user-info"><span id="userName"></span><button id="logoutBtn" class="btn-icon"><i class="fas fa-sign-out-alt"></i></button></div>
    </header>

    <main class="list-container">
        <div class="glass-card">
            <div class="list-header">
                <h2><i class="fas fa-shopping-cart"></i> Lista de la Compra</h2>
                <div class="add-item-form">
                    <input type="text" id="newItemName" placeholder="Ej: Leche, Pan..." class="glass-input">
                    <button id="addItemBtn" class="btn-primary" style="width: auto;"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <ul id="shoppingList" class="items-list"></ul>
        </div>
    </main>

    <div class="floating-dock">
        <a href="home.html" class="dock-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="calculator.html" class="dock-item"><i class="fas fa-calculator"></i><span>Horas</span></a>
        <a href="shopping.html" class="dock-item active"><i class="fas fa-shopping-cart"></i><span>Compras</span></a>
        <a href="books.html" class="dock-item"><i class="fas fa-book"></i><span>Libros</span></a>
        <a href="series.html" class="dock-item"><i class="fas fa-tv"></i><span>Series</span></a>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/shopping.js"></script>
</body>
</html>
